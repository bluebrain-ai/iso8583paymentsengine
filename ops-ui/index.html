<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IsoSwitch — Payment Command Center v2</title>

  <!-- React 18 via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- JSX transformer (Babel standalone) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #060b18;
      --surface:  #0c1222;
      --surface2: #111827;
      --border:   #1e2d45;
      --border2:  #243347;
      --text:     #cbd5e1;
      --muted:    #475569;
      --dim:      #1e293b;
      --cyan:     #06b6d4;
      --emerald:  #10b981;
      --amber:    #f59e0b;
      --red:      #ef4444;
      --indigo:   #818cf8;
      --purple:   #a78bfa;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; overflow: hidden; }
    #root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* Layout */
    .app { display: flex; flex-direction: column; height: 100vh; padding: 10px 12px; gap: 8px; overflow: hidden; }
    .header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .row { display: grid; gap: 8px; flex-shrink: 0; }
    .row-top    { grid-template-columns: 3fr 5fr 4fr; height: 260px; }
    .row-bottom { grid-template-columns: 3fr 6fr 3fr; flex: 1; min-height: 0; }

    /* Card */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
    .card-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .card-body { flex: 1; overflow-y: auto; min-height: 0; }
    .card-title { font-weight: 600; font-size: 12.5px; color: #e2e8f0; display: flex; align-items: center; gap: 6px; }

    /* Forms */
    input[type=number], input[type=text] {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; padding: 6px 10px; color: var(--text); font-family: inherit;
      font-size: 12px; outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--cyan); }
    input:disabled { opacity: 0.4; cursor: not-allowed; }
    input[type=range] { width: 100%; cursor: pointer; accent-color: var(--cyan); }

    /* Buttons */
    .btn { display: flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 7px; padding: 8px 14px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: var(--cyan); color: #fff; }
    .btn-primary:hover { background: #0891b2; }
    .btn-primary:disabled { background: var(--dim); color: var(--muted); cursor: not-allowed; }
    .btn-danger  { background: #450a0a; color: var(--red); border: 1px solid #7f1d1d; }
    .btn-danger:hover { background: #7f1d1d; }
    .btn-sm { padding: 5px 10px; }

    /* Badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 600; border: 1px solid; }
    .badge-live    { color: var(--emerald); background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.3); }
    .badge-done    { color: var(--muted);   background: var(--surface2);       border-color: var(--border2); }
    .badge-system  { color: var(--muted);   background: transparent;            border-color: var(--border2); }
    .dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Progress bar */
    .progress { height: 4px; background: var(--dim); border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 2px; transition: width 0.5s ease; background: var(--cyan); }

    /* Stat grid */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; }
    .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
    .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px; }

    /* Transaction table */
    .tx-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .tx-table th { position: sticky; top: 0; background: var(--surface); padding: 7px 10px; text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); z-index: 1; }
    .tx-table td { padding: 6px 10px; border-bottom: 1px solid rgba(30,45,69,0.5); white-space: nowrap; }
    .tx-table tr { cursor: pointer; transition: background 0.1s; }
    .tx-table tr:hover td { background: rgba(30,45,69,0.4); }
    .tx-table tr.selected td { background: rgba(30,45,69,0.8); }

    /* Status colors */
    .c-success { color: var(--emerald); }
    .c-timeout  { color: var(--amber);  }
    .c-decline  { color: var(--red);    }
    .c-cyan     { color: var(--cyan);   }
    .c-indigo   { color: var(--indigo); }
    .c-muted    { color: var(--muted);  }
    .c-purple   { color: var(--purple); }

    /* Code blocks */
    .code-block { background: #020817; border: 1px solid var(--border); border-radius: 6px; padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 10px; word-break: break-all; line-height: 1.6; }

    /* Inspector field */
    .field-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; font-weight: 600; }
    .field-value { font-size: 12px; color: var(--text); margin-bottom: 12px; }

    /* Distribution bar */
    .dist-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; gap: 1px; background: var(--dim); }
    .dist-bar-seg { height: 100%; transition: width 0.5s ease; }

    /* Spinner */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Node graph */
    .topo-node { transition: all 0.25s ease; }
    .topo-line { transition: all 0.25s ease; }

    /* Journal row */
    .journal-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; border-radius: 5px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 5px; }

    /* Util */
    .mono { font-family: 'JetBrains Mono', monospace; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .flex { display: flex; } .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; }
    .p-4  { padding: 4px; }
    .mb-6 { margin-bottom: 6px; }
    .mt-auto { margin-top: auto; }
    .w-full { width: 100%; }
    .ml-auto { margin-left: auto; }
    .text-right { text-align: right; }
    .small { font-size: 10px; }
    .bold { font-weight: 700; }
  </style>

  <!-- TailwindCSS & Lucide for Domain Control Plane -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { corePlugins: { preflight: false } }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .glass {
      background: rgba(18, 18, 18, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;
    const API = '';  // same origin — port 3001

    // ============================================================
    // usePoll — self-contained polling hook with AbortController
    // If previous fetch is still pending, the next tick is skipped.
    // This prevents connection pool exhaustion under any load.
    // ============================================================
    function usePoll(url, intervalMs = 1000) {
      const [data, setData] = useState(null);
      const pendingRef = useRef(false);

      useEffect(() => {
        let alive = true;

        async function tick() {
          if (pendingRef.current) return;          // skip if still waiting
          pendingRef.current = true;
          const ctrl  = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 2000);
          try {
            const r = await fetch(API + url, { signal: ctrl.signal });
            clearTimeout(timer);
            if (alive && r.ok) setData(await r.json());
          } catch {
            clearTimeout(timer);
          } finally {
            pendingRef.current = false;
          }
        }

        tick();
        const id = setInterval(tick, intervalMs);
        return () => { alive = false; clearInterval(id); };
      }, [url, intervalMs]);

      return data;
    }

    // ============================================================
    // SVG Sparkline — no recharts, no ResizeObserver
    // ============================================================
    function Sparkline({ values, stroke, label, unit }) {
      const W = 300, H = 52;
      const max = Math.max(...values, 1);
      const pts = values.map((v, i) => {
        const x = (i / (values.length - 1)) * W;
        const y = H - (v / max) * H * 0.85;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      }).join(' ');
      const cur = values[values.length - 1] ?? 0;
      const areaBase = `${(values.length-1)/(values.length-1)*W},${H} 0,${H}`;

      return (
        <div style={{ flex: 1, background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', display: 'flex', flexDirection: 'column', gap: 4 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)', fontWeight: 600 }}>{label}</span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 18, color: stroke }}>
              {cur.toLocaleString()}<span style={{ fontSize: 10, color: 'var(--muted)', marginLeft: 2 }}>{unit}</span>
            </span>
          </div>
          <div style={{ flex: 1, position: 'relative', minHeight: 40 }}>
            <svg viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: '100%', position: 'absolute', inset: 0 }} preserveAspectRatio="none">
              <defs>
                <linearGradient id={`g${label}`} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%"   stopColor={stroke} stopOpacity="0.35" />
                  <stop offset="100%" stopColor={stroke} stopOpacity="0"    />
                </linearGradient>
              </defs>
              {values.length > 1 && (
                <>
                  <polygon points={`${pts} ${areaBase}`} fill={`url(#g${label})`} />
                  <polyline points={pts} fill="none" stroke={stroke} strokeWidth="1.8" vectorEffect="non-scaling-stroke" />
                  <circle cx={(values.length-1)/(values.length-1)*W} cy={H - (values[values.length-1]/max)*H*0.85} r="3" fill={stroke} vectorEffect="non-scaling-stroke" />
                </>
              )}
            </svg>
          </div>
        </div>
      );
    }

    // ============================================================
    // ControlPanel — fully self-contained, no shared state
    // ============================================================
    function ControlPanel() {
      const [volume, setVolume]     = useState(1000);
      const [concur, setConcur]     = useState(20);
      const [happy,  setHappy]      = useState(80);
      const [tout,   setTout]       = useState(10);
      const [decl,   setDecl]       = useState(10);

      // Networks
      const [visa, setVisa]         = useState(40);
      const [mc, setMc]             = useState(40);
      const [amex, setAmex]         = useState(20);

      // Entry Mode
      const [applePay, setApplePay] = useState(30);
      const [emv, setEmv]           = useState(40);
      const [pos, setPos]           = useState(30);

      // Dialect
      const [base24, setBase24]     = useState(25);
      const [connex, setConnex]     = useState(25);
      const [interac, setInterac]   = useState(25);
      const [ukFps, setUkFps]       = useState(25);
      const [iso1987, setIso1987]   = useState(0);
      const [iso1993, setIso1993]   = useState(0);
      const [iso2003, setIso2003]   = useState(0);

      const [err,    setErr]        = useState(null);
      const status = usePoll('/sim/status', 800);
      const isRunning = status?.running ?? false;
      const progress  = (isRunning && status?.totalTarget > 0)
        ? (status.completed / status.totalTarget) * 100 : 0;

      const start = async () => {
        setErr(null);
        const tot = (happy + tout + decl) || 1;
        const netTot = (visa + mc + amex) || 1;
        const modeTot = (applePay + emv + pos) || 1;
        const dialTot = (base24 + connex + interac + ukFps + iso1987 + iso1993 + iso2003) || 1;

        const r = await fetch('/sim/start', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            volume, concurrency: concur, 
            dist: { happy: happy/tot, timeout: tout/tot, decline: decl/tot },
            networks: { visa: visa/netTot, mastercard: mc/netTot, amex: amex/netTot },
            modes: { apple_pay: applePay/modeTot, emv: emv/modeTot, pos: pos/modeTot },
            dialects: { base24: base24/dialTot, connex: connex/dialTot, interac: interac/dialTot, uk_fps: ukFps/dialTot, iso_1987: iso1987/dialTot, iso_1993: iso1993/dialTot, iso_2003: iso2003/dialTot }
          }),
        });
        if (!r.ok) setErr((await r.json()).error ?? 'Failed');
      };

      const cancel = () => fetch('/sim/cancel', { method: 'POST' });

      const SliderRow = ({ label, val, set, color }) => (
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 10, color, width: 44, flexShrink: 0 }}>{label}</span>
          <input type="range" min={0} max={100} value={val} disabled={isRunning}
            onChange={e => set(Number(e.target.value))}
            style={{ flex: 1, accentColor: color }} />
          <span className="mono" style={{ fontSize: 10, color: 'var(--muted)', width: 30, textAlign: 'right' }}>{val}%</span>
        </div>
      );

      return (
        <div className="card">
          <div className="card-header">
            <span className="card-title">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
              Load Generator
            </span>
            {isRunning && status && (
              <span className="mono" style={{ fontSize: 10, color: 'var(--cyan)', background: 'rgba(6,182,212,0.08)', border: '1px solid rgba(6,182,212,0.25)', borderRadius: 4, padding: '2px 7px' }}>
                {status.completed.toLocaleString()} / {status.totalTarget.toLocaleString()}
              </span>
            )}
          </div>
          <div className="card-body" style={{ padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>
            {/* Progress bar */}
            <div className="progress">
              <div className="progress-bar" style={{ width: `${progress}%`, background: isRunning ? 'var(--cyan)' : 'var(--dim)' }} />
            </div>

            {/* Volume + Concurrency */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              <div>
                <div className="field-label" style={{ marginBottom: 4 }}>Volume</div>
                <input type="number" value={volume} min={1} disabled={isRunning}
                  onChange={e => setVolume(Math.max(1, Number(e.target.value)))} />
              </div>
              <div>
                <div className="field-label" style={{ marginBottom: 4 }}>Concurrency</div>
                <input type="number" value={concur} min={1} disabled={isRunning}
                  onChange={e => setConcur(Math.max(1, Number(e.target.value)))} />
              </div>
            </div>

            {/* Distributions container */}
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, borderTop: '1px solid var(--border)', paddingTop: 10 }}>
              <div>
                <div className="field-label" style={{ marginBottom: 6 }}>Traffic Distribution</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <SliderRow label="Happy"   val={happy} set={setHappy} color="var(--emerald)" />
                  <SliderRow label="Timeout" val={tout}  set={setTout}  color="var(--amber)"   />
                  <SliderRow label="Decline" val={decl}  set={setDecl}  color="var(--red)"     />
                </div>
              </div>

              <div>
                <div className="field-label" style={{ marginBottom: 6 }}>Network Type</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <SliderRow label="Visa" val={visa} set={setVisa} color="var(--cyan)" />
                  <SliderRow label="Mastercard" val={mc} set={setMc} color="var(--amber)" />
                  <SliderRow label="Amex" val={amex} set={setAmex} color="var(--indigo)" />
                </div>
              </div>

              <div>
                <div className="field-label" style={{ marginBottom: 6 }}>Entry Mode</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <SliderRow label="ApplePay" val={applePay} set={setApplePay} color="#a3aaae" />
                  <SliderRow label="EMV" val={emv} set={setEmv} color="var(--purple)" />
                  <SliderRow label="POS" val={pos} set={setPos} color="var(--muted)" />
                </div>
              </div>

              <div>
                <div className="field-label" style={{ marginBottom: 6 }}>Protocol Engine</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                  <SliderRow label="Base24" val={base24} set={setBase24} color="var(--cyan)" />
                  <SliderRow label="Connex" val={connex} set={setConnex} color="var(--emerald)" />
                  <SliderRow label="Interac" val={interac} set={setInterac} color="var(--amber)" />
                  <SliderRow label="UK FPS" val={ukFps} set={setUkFps} color="var(--indigo)" />
                  <SliderRow label="ISO 1987" val={iso1987} set={setIso1987} color="var(--purple)" />
                  <SliderRow label="ISO 1993" val={iso1993} set={setIso1993} color="var(--blue)" />
                  <SliderRow label="ISO 2003" val={iso2003} set={setIso2003} color="var(--red)" />
                </div>
              </div>
            </div>

            {/* Live TPS badge */}
            {isRunning && status && (
              <div style={{ display: 'flex', justifyContent: 'space-between', background: 'var(--surface2)', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 10px' }}>
                <span style={{ fontSize: 10, color: 'var(--muted)' }}>Live TPS</span>
                <span className="mono bold c-cyan">{status.tps}</span>
              </div>
            )}

            {err && <div style={{ fontSize: 10, color: 'var(--red)', background: 'rgba(239,68,68,0.08)', border: '1px solid rgba(239,68,68,0.25)', borderRadius: 5, padding: '6px 10px' }}>{err}</div>}

            {/* Buttons */}
            <div style={{ display: 'flex', gap: 8, marginTop: 'auto' }}>
              {isRunning && (
                <button className="btn btn-danger" onClick={cancel} style={{ padding: '8px 12px' }}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </button>
              )}
              <button className="btn btn-primary" style={{ flex: 1 }} onClick={start} disabled={isRunning}>
                {isRunning
                  ? <><div className="spinner" /><span>Running...</span></>
                  : <><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg><span>Deploy Load Test</span></>
                }
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // TopologyFlow — polls /sim/pulses @ 250ms, SVG-based
    // ============================================================
    function TopologyFlow() {
      const pulses = usePoll('/sim/pulses', 250) ?? [];

      // Node definitions — order reflects the physical data-flow left-to-right.
      // 'tsp' is the Token Service Provider Vault inside the switch-core; it sits
      // between the Ingress Gateway and the Core Engine and is only exercised for
      // Apple Pay / NFC tokenized transactions.
      const NODES = [
        { id: 'terminal', label: 'POS',  sub: 'Terminal',     color: 'var(--cyan)'   },
        { id: 'ingress',  label: 'API',  sub: 'Ingress GW',   color: 'var(--cyan)'   },
        { id: 'tsp',      label: 'TSP',  sub: 'Token Vault',  color: 'var(--amber)'  },
        { id: 'hsm',      label: 'HSM',  sub: 'Thales Mock',  color: 'var(--purple)' },
        { id: 'core',     label: 'CPU',  sub: 'Switch Core',  color: 'var(--cyan)'   },
        { id: 'egress',   label: 'OUT',  sub: 'Egress GW',    color: 'var(--cyan)'   },
        { id: 'bank',     label: 'BANK', sub: 'Mock Bank',    color: 'var(--emerald)'},
      ];

      // Adjacency: defines which node-pairs are connected by a rail.
      // The TSP Vault sits on a 'branch' between ingress and core; the HSM is also
      // a branch off ingress → core. Neither TSP nor HSM connect to each other.
      const RAILS = [
        [0, 1], // terminal → ingress
        [1, 2], // ingress  → tsp   (tokenized branch)
        [1, 3], // ingress  → hsm   (PIN-entry branch)
        [2, 4], // tsp      → core
        [3, 4], // hsm      → core
        [4, 5], // core     → egress
        [5, 6], // egress   → bank
      ];

      const W_SVG = 780;
      // Two-row layout: main row (terminal, ingress, core, egress, bank) across the
      // centre; TSP and HSM on offset rows to show the branch topology cleanly.
      const ROW_MAIN = 90;       // y-centre of main pipeline
      const ROW_BRANCH = 38;     // TSP (above) — tokenized path
      const ROW_HSM    = 142;    // HSM (below) — PIN path
      const R = 26;              // node radius

      // X positions — placed so the branches visually fork off ingress:
      //   terminal  ingress  [tsp/hsm]  core  egress  bank
      const NODE_X = {
        terminal: 55,
        ingress:  185,
        tsp:      305,
        hsm:      305,
        core:     435,
        egress:   565,
        bank:     695,
      };
      const NODE_Y = {
        terminal: ROW_MAIN,
        ingress:  ROW_MAIN,
        tsp:      ROW_BRANCH,
        hsm:      ROW_HSM,
        core:     ROW_MAIN,
        egress:   ROW_MAIN,
        bank:     ROW_MAIN,
      };

      const nodeMap = {};
      for (const p of pulses) {
        if (!nodeMap[p.currentNode]) nodeMap[p.currentNode] = { req: 0, res: 0, rev: 0 };
        nodeMap[p.currentNode][p.phase]++;
      }

      // Helper: intersection point on circle perimeter toward a target point.
      const edgePoint = (cx, cy, tx, ty, radius) => {
        const dx = tx - cx, dy = ty - cy;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return [cx + (dx / dist) * radius, cy + (dy / dist) * radius];
      };

      return (
        <div className="card">
          <div className="card-header">
            <span className="card-title">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--indigo)" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="5" r="3"/><circle cx="19" cy="19" r="3"/><circle cx="5"  cy="19" r="3"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="12" x2="19" y2="16"/><line x1="12" y1="12" x2="5"  y2="16"/></svg>
              Network Topology
            </span>
            <span style={{ fontSize: 10, color: 'var(--muted)' }} className="mono">{pulses.length} active</span>
          </div>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', padding: '6px 10px' }}>
            <svg viewBox={`0 0 ${W_SVG} 185`} style={{ width: '100%', flex: 1 }} preserveAspectRatio="xMidYMid meet">

              {/* Connector rails */}
              {RAILS.map(([a, b], i) => {
                const na = NODES[a], nb = NODES[b];
                const [x1, y1] = edgePoint(NODE_X[na.id], NODE_Y[na.id], NODE_X[nb.id], NODE_Y[nb.id], R);
                const [x2, y2] = edgePoint(NODE_X[nb.id], NODE_Y[nb.id], NODE_X[na.id], NODE_Y[na.id], R);
                // Branch rails (TSP and HSM legs) are styled differently to indicate optionality.
                const isBranch = na.id === 'tsp' || na.id === 'hsm' || nb.id === 'tsp' || nb.id === 'hsm';
                return (
                  <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke={isBranch ? 'var(--border2)' : 'var(--border2)'}
                    strokeWidth={isBranch ? '1.5' : '2'}
                    strokeDasharray={isBranch ? '3 4' : '4 3'}
                    opacity={isBranch ? 0.6 : 1} />
                );
              })}

              {/* Branch labels */}
              <text x={NODE_X.tsp} y={(NODE_Y.ingress + NODE_Y.tsp) / 2 - 4}
                textAnchor="middle" fontSize="7.5" fill="var(--amber)" fontFamily="Inter, sans-serif" opacity="0.7">
                NFC/Tokenized
              </text>
              <text x={NODE_X.hsm} y={(NODE_Y.ingress + NODE_Y.hsm) / 2 + 12}
                textAnchor="middle" fontSize="7.5" fill="var(--purple)" fontFamily="Inter, sans-serif" opacity="0.7">
                PIN Entry
              </text>

              {/* Nodes */}
              {NODES.map((node) => {
                const cx = NODE_X[node.id];
                const cy = NODE_Y[node.id];
                const act    = nodeMap[node.id] ?? {};
                const hasReq = act.req > 0;
                const hasRes = act.res > 0;
                const hasRev = act.rev > 0;
                const count  = (act.req || 0) + (act.res || 0) + (act.rev || 0);

                let stroke = node.id === 'tsp' ? 'rgba(245,158,11,0.35)' : 'var(--border2)';
                let fill   = node.id === 'tsp' ? '#1a1005' : 'var(--surface2)';
                let glow   = '';
                if      (hasRev) { stroke = 'var(--red)';    fill = '#1a0a0a'; glow = 'drop-shadow(0 0 10px rgba(239,68,68,0.7))';   }
                else if (hasRes) { stroke = 'var(--emerald)'; fill = '#031a13'; glow = 'drop-shadow(0 0 10px rgba(16,185,129,0.7))'; }
                else if (hasReq) {
                  stroke = node.id === 'tsp' ? 'var(--amber)' : 'var(--cyan)';
                  fill   = node.id === 'tsp' ? '#1f1205' : '#031820';
                  glow   = node.id === 'tsp'
                    ? 'drop-shadow(0 0 10px rgba(245,158,11,0.7))'
                    : 'drop-shadow(0 0 10px rgba(6,182,212,0.7))';
                }

                const labelColor = (count > 0) ? stroke : (node.id === 'tsp' ? 'rgba(245,158,11,0.45)' : 'var(--muted)');

                return (
                  <g key={node.id} style={{ filter: glow, transition: 'filter 0.2s' }}>
                    {count > 0 && (
                      <circle cx={cx} cy={cy} r={R + 8} fill="none" stroke={stroke} strokeWidth="1" strokeOpacity="0.3">
                        <animate attributeName="r"              from={R + 4} to={R + 16} dur="1.5s" repeatCount="indefinite" />
                        <animate attributeName="stroke-opacity" from="0.4"   to="0"      dur="1.5s" repeatCount="indefinite" />
                      </circle>
                    )}
                    <circle cx={cx} cy={cy} r={R} fill={fill} stroke={stroke} strokeWidth={node.id === 'tsp' ? '1.5' : '2'}
                      strokeDasharray={node.id === 'tsp' && count === 0 ? '4 2' : undefined}
                      style={{ transition: 'all 0.25s' }} />
                    <text x={cx} y={cy - 4} textAnchor="middle" fontSize="9" fontWeight="bold"
                      fill={labelColor} fontFamily="'JetBrains Mono', monospace" style={{ transition: 'fill 0.25s' }}>
                      {node.label}
                    </text>
                    {count > 0 && (
                      <text x={cx} y={cy + 8} textAnchor="middle" fontSize="7.5" fill={stroke} fontFamily="'JetBrains Mono', monospace">{count}</text>
                    )}
                    <text x={cx} y={cy + R + 13} textAnchor="middle" fontSize="8.5" fill="var(--muted)" fontFamily="Inter, sans-serif">{node.sub}</text>
                  </g>
                );
              })}
            </svg>

            {/* Legend */}
            <div style={{ display: 'flex', gap: 14, justifyContent: 'center', fontSize: 9, color: 'var(--muted)', paddingBottom: 4 }}>
              {[['var(--cyan)', 'Request'], ['var(--emerald)', 'Response'], ['var(--red)', 'Reversal'], ['var(--amber)', 'TSP Vault']].map(([c, l]) => (
                <span key={l} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span style={{ width: 7, height: 7, borderRadius: '50%', background: c }} />{l}
                </span>
              ))}
            </div>
          </div>
        </div>
      );
    }


    // ============================================================
    // MetricsPanel — polls /sim/status @ 1s, custom SVG sparklines
    // ============================================================
    function MetricsPanel() {
      const [tpsPoints,   setTpsPoints]   = useState(Array(40).fill(0));
      const [latPoints,   setLatPoints]   = useState(Array(40).fill(0));
      const latestRef = useRef({ tps: 0, latency: 0 });
      const pendingRef = useRef(false);

      useEffect(() => {
        let alive = true;
        const tick = async () => {
          if (pendingRef.current) return;
          pendingRef.current = true;
          const ctrl = new AbortController();
          const timer = setTimeout(() => ctrl.abort(), 2000);
          try {
            const r = await fetch('/sim/status', { signal: ctrl.signal });
            clearTimeout(timer);
            if (alive && r.ok) {
              const d = await r.json();
              latestRef.current = { tps: d.tps ?? 0, latency: d.avgLatencyMs ?? 0 };
              setTpsPoints(p => [...p.slice(1), d.tps ?? 0]);
              setLatPoints(p => [...p.slice(1), d.avgLatencyMs ?? 0]);
            }
          } catch { clearTimeout(timer); } finally { pendingRef.current = false; }
        };
        tick();
        const id = setInterval(tick, 1000);
        return () => { alive = false; clearInterval(id); };
      }, []);

      return (
        <div className="card">
          <div className="card-header">
            <span className="card-title">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" strokeWidth="2" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Live Telemetry
            </span>
            <span style={{ fontSize: 9, color: 'var(--muted)' }}>1s refresh</span>
          </div>
          <div className="card-body" style={{ padding: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
            <Sparkline values={tpsPoints} stroke="var(--cyan)"    label="Throughput" unit="t/s" />
            <Sparkline values={latPoints} stroke="var(--emerald)" label="Avg Latency" unit="ms"  />
          </div>
        </div>
      );
    }

    // ============================================================
    // ExecutionReport — polls /sim/status @ 500ms
    // ============================================================
    function ExecutionReport() {
      const status = usePoll('/sim/status', 500);
      const isRunning = status?.running ?? false;
      const hasData   = !!(status && status.totalTarget > 0);
      const s = status ?? {};

      const progress   = hasData ? (s.completed / s.totalTarget) * 100 : 0;
      const sP = s.completed > 0 ? (s.success / s.completed * 100) : 0;
      const tP = s.completed > 0 ? (s.timeout / s.completed * 100) : 0;
      const dP = s.completed > 0 ? (s.decline / s.completed * 100) : 0;

      const STATS = hasData ? [
        { label: 'Approved',  val: (s.success  ?? 0).toLocaleString(), color: 'var(--emerald)' },
        { label: 'Timeout',   val: (s.timeout  ?? 0).toLocaleString(), color: 'var(--amber)'   },
        { label: 'Declined',  val: (s.decline  ?? 0).toLocaleString(), color: 'var(--red)'     },
        { label: 'In Flight', val: (s.inFlight ?? 0).toLocaleString(), color: 'var(--cyan)'    },
        { label: 'TPS',       val: (s.tps ?? 0).toLocaleString(),      color: 'var(--indigo)'  },
        { label: 'Avg RT',    val: `${s.avgLatencyMs ?? 0}ms`,         color: 'var(--muted)'   },
      ] : [];

      return (
        <div className="card">
          <div className="card-header">
            <span className="card-title">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--indigo)" strokeWidth="2" strokeLinecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6"  y1="20" x2="6"  y2="14"/></svg>
              Execution Report
            </span>
            {isRunning
              ? <span className="badge badge-live"><span className="dot-pulse" />LIVE</span>
              : hasData ? <span className="badge badge-done">DONE</span> : null}
          </div>
          <div className="card-body" style={{ padding: '10px 14px', display: 'flex', flexDirection: 'column', gap: 8 }}>
            {!hasData ? (
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: 'var(--muted)', gap: 6 }}>
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" opacity="0.3"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                <span style={{ fontSize: 11 }}>No active test</span>
              </div>
            ) : (
              <>
                {/* Overall progress */}
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: 'var(--muted)', marginBottom: 4 }}>
                    <span>Progress</span>
                    <span className="mono">{s.completed?.toLocaleString()} / {s.totalTarget?.toLocaleString()}</span>
                  </div>
                  <div className="progress"><div className="progress-bar" style={{ width: `${progress}%` }} /></div>
                </div>

                {/* Distribution stacked bar */}
                {s.completed > 0 && (
                  <div>
                    <div className="dist-bar">
                      <div className="dist-bar-seg" style={{ width: `${sP}%`, background: 'var(--emerald)' }} />
                      <div className="dist-bar-seg" style={{ width: `${tP}%`, background: 'var(--amber)'   }} />
                      <div className="dist-bar-seg" style={{ width: `${dP}%`, background: 'var(--red)'     }} />
                    </div>
                    <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, marginTop: 3 }}>
                      <span className="mono c-success">{sP.toFixed(0)}%</span>
                      <span className="mono c-timeout">{tP.toFixed(0)}%</span>
                      <span className="mono c-decline">{dP.toFixed(0)}%</span>
                    </div>
                  </div>
                )}

                {/* Stat grid */}
                <div className="stat-grid">
                  {STATS.map(({ label, val, color }) => (
                    <div className="stat-card" key={label}>
                      <div className="stat-label" style={{ color }}>{label}</div>
                      <div className="stat-value" style={{ color }}>{val}</div>
                    </div>
                  ))}
                </div>

                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--muted)', borderTop: '1px solid var(--border)', paddingTop: 8 }}>
                  <span>Elapsed</span>
                  <span className="mono">{((s.elapsedMs ?? 0) / 1000).toFixed(1)}s</span>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ============================================================
    // MessageInspector — polls /sim/history @ 500ms
    // ============================================================
    function MessageInspector() {
      const history = usePoll('/sim/history', 500) ?? [];
      const [selId, setSelId] = useState(null);

      // Auto-select newest
      useEffect(() => {
        if (history.length > 0 && !selId) setSelId(history[0].id);
      }, [history.length]);

      const sel = history.find(h => h.id === selId) ?? null;

      const statusColor = s => s === 'success' ? 'var(--emerald)' : s === 'timeout' ? 'var(--amber)' : 'var(--red)';
      const statusMsg = s =>
        s === 'success' ? '00 — Approved'
        : s === 'timeout' ? 'TO — Network Timeout'
        : '05 — Do Not Honor';

      const ISO_FIELDS = {
        1: "Secondary Bitmap",
        2: "Primary Account Number (PAN)",
        3: "Processing Code",
        4: "Amount, Transaction",
        7: "Transmission Date & Time",
        11: "System Trace Audit Number (STAN)",
        12: "Time, Local Transaction",
        13: "Date, Local Transaction",
        14: "Date, Expiration",
        22: "Point of Service Entry Mode",
        32: "Acquiring Institution ID Code",
        37: "Retrieval Reference Number",
        39: "Response Code",
        41: "Card Acceptor Terminal ID",
        42: "Card Acceptor ID Code",
        43: "Card Acceptor Name/Location",
        48: "Additional Data - Private",
        49: "Currency Code, Transaction",
        52: "Personal Identification Number Data",
        64: "Message Authentication Code (MAC)",
        90: "Original Data Elements",
        102: "Account Identification 1",
        103: "Account Identification 2",
        128: "Message Authentication Code (MAC)"
      };

      const hexToBin = (hex) => {
          let bin = '';
          for(let i=0; i<hex.length; i++) {
              let parsed = parseInt(hex[i], 16);
              if (!isNaN(parsed)) {
                  bin += parsed.toString(2).padStart(4, '0');
              } else {
                  bin += '0000';
              }
          }
          return bin;
      };

      let bitsStr = '';
      if (sel && sel.rawIsoHex) {
          // Assume MTI is 4 bytes ASCII -> 8 chars hex.
          let primaryHex = sel.rawIsoHex.substring(8, 24);
          bitsStr = hexToBin(primaryHex);
          if (bitsStr[0] === '1') {
              let secondaryHex = sel.rawIsoHex.substring(24, 40);
              bitsStr += hexToBin(secondaryHex);
          } else {
              bitsStr = bitsStr.padEnd(128, '0');
          }
      }

      return (
        <div className="card" style={{ flexDirection: 'column' }}>
          {/* Table */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
            <div className="card-header">
              <span className="card-title">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" strokeWidth="2" strokeLinecap="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
                Transaction History
              </span>
              <span style={{ fontSize: 10, color: 'var(--muted)' }}>{history.length} records</span>
            </div>
            <div className="card-body">
              <table className="tx-table">
                <thead>
                  <tr>
                    <th>Status</th><th>ID</th><th>Network</th><th>Type</th><th>Dialect</th><th style={{ textAlign: 'right' }}>RT</th><th style={{ textAlign: 'right' }}>Amount</th>
                  </tr>
                </thead>
                <tbody>
                  {history.length === 0 ? (
                    <tr><td colSpan={7} style={{ textAlign: 'center', color: 'var(--muted)', padding: '30px', fontStyle: 'italic' }}>No transactions yet</td></tr>
                  ) : history.map(tx => (
                    <tr key={tx.id} className={selId === tx.id ? 'selected' : ''} onClick={() => setSelId(tx.id)}>
                      <td>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 5, color: statusColor(tx.status) }}>
                          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                            {tx.status === 'success' ? <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></> :
                             tx.status === 'timeout' ? <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></> :
                             <><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></>}
                          </svg>
                          <span style={{ fontSize: 11, fontWeight: 600, textTransform: 'capitalize' }}>{tx.status}</span>
                        </div>
                      </td>
                      <td className="mono" style={{ color: 'var(--muted)' }}>{tx.id}</td>
                      <td style={{ fontSize: 10 }}>
                        <span style={{ color: 'var(--cyan)', background: 'var(--surface2)', border: `1px solid var(--border)`, borderRadius: 4, padding: '1px 6px', fontSize: 10 }}>{tx.network || '---'}</span>
                      </td>
                      <td style={{ fontSize: 10 }}>
                        <span style={{ color: statusColor(tx.status), background: 'var(--surface2)', border: `1px solid ${statusColor(tx.status)}30`, borderRadius: 4, padding: '1px 6px', fontSize: 10 }}>{tx.entryMode || tx.type}</span>
                      </td>
                      <td style={{ fontSize: 10 }}>
                        <span style={{ color: 'var(--purple)', background: 'var(--surface2)', border: '1px solid rgba(168,85,247,0.3)', borderRadius: 4, padding: '1px 6px', fontSize: 10 }}>{tx.dialect || 'Base24'}</span>
                      </td>
                      <td className="mono" style={{ textAlign: 'right', color: tx.totalDurationMs > 5000 ? 'var(--amber)' : 'var(--muted)' }}>{tx.totalDurationMs}ms</td>
                      <td className="mono" style={{ textAlign: 'right', color: 'var(--text)' }}>${tx.amount}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {/* Modal Inspector Detail */}
          {sel && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-[#121212] border border-white/10 w-full max-w-4xl rounded-2xl p-6 shadow-2xl relative flex flex-col max-h-[90vh]">
                <button onClick={() => setSelId(null)} className="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors">
                  <Icon name="X" className="w-5 h-5" />
                </button>
                <div className="flex items-center gap-3 mb-6 border-b border-white/10 pb-4">
                  <div className={`p-2 rounded-lg ${sel.status === 'success' ? 'bg-emerald-900/40 text-emerald-400' : sel.status === 'timeout' ? 'bg-amber-900/40 text-amber-400' : 'bg-red-900/40 text-red-400'}`}>
                    <Icon name="Search" className="w-5 h-5" />
                  </div>
                  <div>
                    <h3 className="text-xl font-bold flex items-center gap-2 text-white m-0">
                      ISO-8583 Message Inspector
                    </h3>
                    <p className="text-xs text-gray-400 mt-1">Transaction: {sel.id}</p>
                  </div>
                </div>

                <div className="overflow-y-auto flex-1 pr-2 custom-scrollbar">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                      {[
                        ['Status Message',   statusMsg(sel.status),         false, statusColor(sel.status)],
                        ['Network',          sel.network || '---',          false, 'var(--cyan)'],
                        ['Entry Mode',       sel.entryMode || '---',        false, null],
                        ['Protocol',         sel.dialect || '---',          false, 'var(--purple)'],
                        ['Profile',          sel.type,                      false, 'var(--muted)'],
                        ['Amount',           `$${sel.amount}`,              true,  null],
                        ['Round Trip',       `${sel.totalDurationMs}ms`,    true,  sel.totalDurationMs > 5000 ? 'var(--amber)' : 'var(--emerald)'],
                        ['Timestamp',        new Date(sel.timestamp).toLocaleString(), false, null],
                        ...(sel.sourceAccount ? [['Source Account', sel.sourceAccount, true, 'var(--emerald)']] : []),
                        ...(sel.destinationAccount ? [['Destination', sel.destinationAccount, true, 'var(--amber)']] : []),
                      ].map(([label, value, mono, color], idx) => (
                        <div key={idx} className="bg-black/40 border border-white/5 rounded-xl p-3">
                          <div className="text-[10px] text-gray-500 uppercase tracking-wider mb-1 font-semibold">{label}</div>
                          <div style={{ fontFamily: mono ? "'JetBrains Mono', monospace" : undefined, color: color ?? 'var(--text)' }} className="text-sm font-medium">{value}</div>
                        </div>
                      ))}
                    </div>

                    <div className="mb-6">
                        <h4 className="text-sm font-semibold text-gray-300 mb-3 flex items-center gap-2 border-b border-white/10 pb-2">
                           <Icon name="ListChecks" className="w-4 h-4 text-cyan-400" />
                           ISO-8583 Data Elements
                        </h4>
                        <div className="flex flex-col gap-1 max-h-80 overflow-y-auto custom-scrollbar pr-2 bg-black/40 rounded-xl p-2 border border-white/5">
                             {Array.from({ length: bitsStr.length > 64 && bitsStr[0] === '1' ? 128 : 64 }).map((_, idx) => {
                                const bit = idx + 1;
                                const active = bitsStr[idx] === '1';
                                const fname = ISO_FIELDS[bit] || 'Standard / Proprietary Field Segment';
                                
                                let val = "";
                                if (active) {
                                    if (bit === 1) val = "<Secondary Bitmap Attached>";
                                    else if (bit === 2) val = sel.sourceAccount ? `***${sel.sourceAccount.slice(-4)}` : "<Masked PAN>";
                                    else if (bit === 3) val = sel.type ? `Type: ${sel.type}` : "Generic ProcCode";
                                    else if (bit === 4) val = `$${sel.amount}`;
                                    else if (bit === 7) val = new Date(sel.timestamp).toISOString();
                                    else if (bit === 11) val = sel.id.substring(0, 6);
                                    else if (bit === 22) val = sel.entryMode || 'Unknown';
                                    else if (bit === 39) val = sel.status === 'success' ? '00 - Approved' : (sel.status === 'timeout' ? 'TO - Timeout' : '05 - Declined');
                                    else if (bit === 49) val = "840 (USD)";
                                    else if (bit === 64 || bit === 128) val = "<Cryptographic MAC Hash>";
                                    else if (bit === 90) val = "<Original Correlation STAN>";
                                    else if (bit === 102) val = sel.sourceAccount || "<Account Hash>";
                                    else if (bit === 103) val = sel.destinationAccount || "<Account Hash>";
                                    else val = "[Variable Binary Sequence]";
                                }

                                return (

              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6, flexShrink: 0 }}>
                <span style={{ fontSize: 9, textTransform: 'uppercase', letterSpacing: '0.07em', color: 'var(--muted)', display: 'flex', alignItems: 'center', gap: 4 }}>

                  WAL Journal

                  ? <div style={{ fontSize: 10, color: 'var(--muted)', fontStyle: 'italic', textAlign: 'center', padding: 6 }}>No WAL records</div>

    // Component to render native Lucide SVGs without the React library binding
    function Icon({ name, className }) {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
          window.lucide.createIcons({
            icons: { [name]: window.lucide.icons[name] },
            nameAttr: 'data-lucide',
            attrs: { class: className }
          });
        }
      }, [name, className]);
      return <i ref={ref} data-lucide={name}></i>;
    }

function TreasuryDashboard() {
  const liquidity = usePoll('/api/ledger/liquidity', 2000) ?? [];
  const institutions = {};
  
  for (const row of liquidity) {
    if (!institutions[row.institution_id]) {
      institutions[row.institution_id] = { shadow: 0, settled: 0 };
    }
    if (row.status === 'shadow') institutions[row.institution_id].shadow = row.total;
    if (row.status === 'settled') institutions[row.institution_id].settled = row.total;
  }

  return (
    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-6">
      {Object.keys(institutions).length === 0 && (
        <div className="col-span-full flex justify-center items-center h-48 border border-white/5 rounded-2xl bg-[#121212] text-gray-400 text-sm italic">
          Awaiting Network Settlement Traffic...
        </div>
      )}
      {Object.entries(institutions).map(([inst, data]) => {
        const total = (data.shadow + data.settled) || 1;
        const shadowPct = (Math.max(0.05, data.shadow / total)) * 100;
        const settledPct = (Math.max(0.05, data.settled / total)) * 100;
        
        return (
          <div key={inst} className="glass rounded-2xl p-6 relative overflow-hidden border border-white/10 bg-[#121212]">
            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-amber-500" />
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-lg font-bold text-gray-200">{inst.replace('_', ' ')}</h3>
              <Icon name="Activity" className="w-5 h-5 text-gray-500" />
            </div>
            
            <div className="flex justify-between mb-2">
              <div className="text-amber-400 flex flex-col">
                <span className="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-1">Shadow Holds</span>
                <span className="font-mono text-xl font-bold">${(data.shadow / 100).toFixed(2)}</span>
              </div>
              <div className="text-emerald-400 flex flex-col items-end">
                <span className="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-1">Settled Liq.</span>
                <span className="font-mono text-xl font-bold">${(data.settled / 100).toFixed(2)}</span>
              </div>
            </div>

            <div className="w-full h-2 bg-gray-900 rounded-full mt-4 flex overflow-hidden">
              <div style={{ width: `${shadowPct}%` }} className="bg-amber-500 h-full transition-all duration-1000"></div>
              <div style={{ width: `${settledPct}%` }} className="bg-emerald-500 h-full transition-all duration-1000"></div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ChaosLabView() {
  const [hex, setHex] = useState('');
  const [logs, setLogs] = useState([]);
  const [statuses, setStatuses] = useState({});
  const [dialect, setDialect] = useState('Base24');
  const [mti, setMti] = useState('0200');
  const [bitmap, setBitmap] = useState('B220000000000000');
  
  // Custom Scenario Args
  const [gpVolume, setGpVolume] = useState(10000);
  const [gpConcurrency, setGpConcurrency] = useState(20);
  const [secBitmap, setSecBitmap] = useState('');
  const [field2, setField2] = useState('4111111111111111');
  const [field3, setField3] = useState('000000');
  const [field4, setField4] = useState('000000001000');
  const [srcAcc, setSrcAcc] = useState('11111111');
  const [destAcc, setDestAcc] = useState('22222222');
  
  // Terminal log ref
  const terminalRef = useRef(null);

  // Sync to Hex
  useEffect(() => {
    // A primitive mock of ISO hex generation based on fields (for UI demonstration)
    if (dialect === 'UK FPS') {
      setHex(mti + bitmap + secBitmap + Array.from(srcAcc).map(c=>c.charCodeAt(0).toString(16)).join('') + Array.from(destAcc).map(c=>c.charCodeAt(0).toString(16)).join('') + field3 + field4);
    } else {
      setHex(mti + bitmap + secBitmap + Array.from(field2).map(c=>c.charCodeAt(0).toString(16)).join('') + field3 + field4);
    }
  }, [mti, bitmap, secBitmap, field2, field3, field4, dialect, srcAcc, destAcc]);

  useEffect(() => {
    let ws;
    let reconnectTimer;
    const connect = () => {
      ws = new WebSocket('ws://127.0.0.1:9001/stream/logs');
      ws.onmessage = (e) => setLogs(prev => [...prev.slice(-99), e.data]);
      ws.onclose = () => { reconnectTimer = setTimeout(connect, 3000); };
    };
    connect();
    return () => { clearTimeout(reconnectTimer); if (ws) ws.close(); };
  }, []);

  useEffect(() => {
    let intv;
    const fetchStatuses = async () => {
      try {
        const r = await fetch('/sim/chaos/status');
        if(r.ok) {
           const s = await r.json();
           setStatuses(s);
        }
      } catch(e){}
    }
    fetchStatuses();
    intv = setInterval(fetchStatuses, 2000);
    return () => clearInterval(intv);
  }, []);

  useEffect(() => {
    if (terminalRef.current) {
       terminalRef.current.scrollTop = terminalRef.current.scrollHeight;
    }
  }, [logs]);

  const injectHex = async () => {
    try {
      await fetch('/sim/inject', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hex })
      });
      setLogs(prev => [...prev, '[SYSTEM] Hex injected successfully.']);
    } catch (e) {
      setLogs(prev => [...prev, '[ERROR] Hex injection failed.']);
    }
  };

  const toggleTarget = async (target) => {
    const isRunning = statuses[target] === 'RUNNING';
    try {
      if (isRunning) {
        await fetch('/sim/chaos/kill/' + target, { method: 'POST' });
      } else {
        await fetch('/sim/chaos/start/' + target, { method: 'POST' });
      }
    } catch(e) {}
  };

  const runScenario = async (id, name) => {
    try {
      setLogs(prev => [...prev, `[SCENARIO] Executing ${name}...`]);
      let body;
      if (id === 1) {
        body = JSON.stringify({ volume: Number(gpVolume), concurrency: Number(gpConcurrency) });
      }
      await fetch('/sim/chaos/scenario/' + id, { 
        method: 'POST',
        headers: body ? { 'Content-Type': 'application/json' } : {},
        body
      });
      setLogs(prev => [...prev, `[SCENARIO] ${name} deployed.`]);
    } catch(e) {
      setLogs(prev => [...prev, `[ERROR] Failed to start ${name}`]);
    }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8, flex: 1, minHeight: 0, overflowY: 'auto', paddingRight: 4, paddingBottom: 16 }}>
      {/* SCENARIOS TRAY */}
      <div className="card" style={{ flexShrink: 0 }}>
        <div className="card-header">
           <span className="card-title">
             <Icon name="Zap" className="w-4 h-4 text-amber-400" />
             Pre-Flight Certification Scenarios
           </span>
        </div>
        <div className="card-body" style={{ padding: 14 }}>
           <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
              <div style={{ background: '#02181d', border: '1px solid var(--cyan)', display: 'flex', flexDirection: 'column', padding: 10, borderRadius: 8 }}>
                 <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontWeight: 700, marginBottom: 4, color: 'var(--cyan)' }}><Icon name="Activity" className="w-4 h-4" />1. Golden Path Stress Test</div>
                 <span style={{ fontSize: 9, color: 'var(--muted)', fontWeight: 400, textAlign: 'left', marginBottom: 8 }}>Baseline simulation.</span>
                 <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
                       <span style={{ fontSize: 8, color: 'var(--muted)', marginBottom: 2 }}>Volume</span>
                       <input type="number" value={gpVolume} onChange={e => setGpVolume(e.target.value)} style={{ width: '100%', background: 'black', border: '1px solid var(--border2)', color: 'white', fontSize: 10, padding: 4 }} />
                    </div>
                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
                       <span style={{ fontSize: 8, color: 'var(--muted)', marginBottom: 2 }}>Threads</span>
                       <input type="number" value={gpConcurrency} onChange={e => setGpConcurrency(e.target.value)} style={{ width: '100%', background: 'black', border: '1px solid var(--border2)', color: 'white', fontSize: 10, padding: 4 }} />
                    </div>
                 </div>
                 <button className="btn btn-primary" onClick={() => runScenario(1, 'Golden Path Stress Test')} style={{ width: '100%', padding: '4px 0', fontSize: 10 }}>Trigger Sequence</button>
              </div>
              
              <button className="btn btn-primary" onClick={() => runScenario(2, 'Egress Blackout')} style={{ background: '#1c100b', border: '1px solid var(--amber)', color: 'var(--amber)', flexDirection: 'column', alignItems: 'flex-start', padding: 10 }}>
                 <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontWeight: 700, marginBottom: 4 }}><Icon name="PowerOff" className="w-4 h-4" />2. Egress Blackout</div>
                 <span style={{ fontSize: 9, color: 'var(--muted)', fontWeight: 400, textAlign: 'left' }}>Testing Radix route drops & STIP.</span>
              </button>
              
              <button className="btn btn-primary" onClick={() => runScenario(3, 'HSM Latency Trap')} style={{ background: '#18101a', border: '1px solid var(--purple)', color: 'var(--purple)', flexDirection: 'column', alignItems: 'flex-start', padding: 10 }}>
                 <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontWeight: 700, marginBottom: 4 }}><Icon name="AlertTriangle" className="w-4 h-4" />3. HSM Latency Trap</div>
                 <span style={{ fontSize: 9, color: 'var(--muted)', fontWeight: 400, textAlign: 'left' }}>Testing SEDA Thread Exhaustion.</span>
              </button>
              
              <button className="btn btn-primary" onClick={() => runScenario(4, 'Poison Pill')} style={{ background: '#101a14', border: '1px solid var(--emerald)', color: 'var(--emerald)', flexDirection: 'column', alignItems: 'flex-start', padding: 10 }}>
                 <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontWeight: 700, marginBottom: 4 }}><Icon name="ShieldAlert" className="w-4 h-4" />4. The Poison Pill</div>
                 <span style={{ fontSize: 9, color: 'var(--muted)', fontWeight: 400, textAlign: 'left' }}>Testing Compliance & Parse Boundary.</span>
              </button>
           </div>
        </div>
      </div>

      <div className="row" style={{ flex: 1, minHeight: 0 }}>
      {/* Target & Build Card */}
      <div className="card" style={{ flex: '1 1 50%', display: 'flex', flexDirection: 'column' }}>
        <div className="card-header">
           <span className="card-title">
             <Icon name="Wrench" className="w-4 h-4 text-amber-500" />
             Message Builder & Hex Injector
           </span>
        </div>
        <div className="card-body" style={{ padding: 14, display: 'flex', flexDirection: 'column', gap: 12 }}>
           <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
             <div>
               <div className="field-label">Dialect</div>
               <select value={dialect} onChange={e => setDialect(e.target.value)} style={{ width: '100%', background: 'var(--surface2)', border: '1px solid var(--border2)', color: 'white', padding: '6px' }}>
                 <option>Base24</option><option>Connex</option><option>Interac</option><option>UK FPS</option>
                 <option>ISO 1987</option><option>ISO 1993</option><option>ISO 2003</option>
               </select>
             </div>
             <div>
               <div className="field-label">MTI</div>
               <input type="text" value={mti} onChange={e => setMti(e.target.value)} className="mono" />
             </div>
           </div>
           
           <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
             <div>
               <div className="field-label">Primary Bitmap (Bits 1-64)</div>
               <input type="text" value={bitmap} onChange={e => setBitmap(e.target.value)} className="mono" />
             </div>
             <div>
               <div className="field-label">Secondary Bitmap (Bits 65-128)</div>
               <input type="text" value={secBitmap} onChange={e => setSecBitmap(e.target.value)} className="mono" placeholder="Empty if no secondary bits" />
             </div>
           </div>
           <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
             {dialect === 'UK FPS' ? (
               <>
                 <div>
                   <div className="field-label">Field 102 (Source)</div>
                   <input type="text" value={srcAcc} onChange={e => setSrcAcc(e.target.value)} className="mono" />
                 </div>
                 <div>
                   <div className="field-label">Field 103 (Dest)</div>
                   <input type="text" value={destAcc} onChange={e => setDestAcc(e.target.value)} className="mono" />
                 </div>
               </>
             ) : (
               <div>
                 <div className="field-label">Field 2 (PAN)</div>
                 <input type="text" value={field2} onChange={e => setField2(e.target.value)} className="mono" />
               </div>
             )}
             <div>
               <div className="field-label">Field 3 (Proc)</div>
               <input type="text" value={field3} onChange={e => setField3(e.target.value)} className="mono" />
             </div>
             <div>
               <div className="field-label">Field 4 (Amt)</div>
               <input type="text" value={field4} onChange={e => setField4(e.target.value)} className="mono" />
             </div>
           </div>

           <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
             <div className="field-label">Raw OSI OSI Layer 7 Hex</div>
             <textarea className="mono code-block" style={{ flex: 1, width: '100%', resize: 'none', background: 'black', color: 'var(--emerald)' }} value={hex} onChange={e => setHex(e.target.value)} />
           </div>

           <button className="btn btn-danger w-full" onClick={injectHex}>Fire Raw TCP Injection</button>
        </div>
      </div>

      {/* Interactive Topology & Logs */}
      <div style={{ flex: '1 1 50%', display: 'flex', flexDirection: 'column', gap: 8 }}>
         <div className="card" style={{ flexShrink: 0 }}>
             <div className="card-header">
               <span className="card-title">
                 <Icon name="Crosshair" className="w-4 h-4 text-red-500" />
                 OS Chaos Targets
               </span>
               <span style={{ fontSize: 9, color: 'var(--amber)' }}>Click node to toggle execute/boot</span>
             </div>
             <div className="card-body" style={{ padding: 14 }}>
                <div style={{ display: 'flex', justifyContent: 'space-around', alignItems: 'center', height: 80 }}>
                  {['mock-bank-node', 'payment-daemon', 'mock_hsm'].map(target => {
                     const run = statuses[target] === 'RUNNING';
                     const ringColor = run ? 'var(--emerald)' : 'var(--red)';
                     const ringLight = run ? '#0a1a0f' : '#1a0505';
                     const ringHover = run ? '#0f3a1d' : '#3f0b0b';
                     const iconStr = run ? 'Activity' : 'PowerOff';
                     const iconCol = run ? 'text-emerald-500' : 'text-red-500';
                     return (
                     <div key={target} onClick={() => toggleTarget(target)} style={{ width: 80, height: 80, borderRadius: '50%', background: ringLight, border: `2px dashed ${ringColor}`, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'crosshair', flexDirection: 'column', transition: 'all 0.2s' }} onMouseEnter={e => e.currentTarget.style.background = ringHover} onMouseLeave={e => e.currentTarget.style.background = ringLight}>
                        <Icon name={iconStr} className={`w-6 h-6 mb-1 ${iconCol}`} />
                        <span style={{ fontSize: 9, color: 'var(--muted)', textAlign: 'center' }}>{target}</span>
                     </div>
                     );
                  })}
                </div>
             </div>
         </div>

         <div className="card" style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0 }}>
            <div className="card-header">
               <span className="card-title">
                 <Icon name="Terminal" className="w-4 h-4 text-cyan-500" />
                 Trace Terminal
               </span>
               <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                 <button className="btn btn-sm" onClick={() => setLogs([])} style={{ background: 'transparent', border: '1px solid var(--border)', color: 'var(--muted)', cursor: 'crosshair' }} onMouseEnter={e => { e.currentTarget.style.color = 'var(--red)'; e.currentTarget.style.borderColor = 'var(--red)'; }} onMouseLeave={e => { e.currentTarget.style.color = 'var(--muted)'; e.currentTarget.style.borderColor = 'var(--border)'; }}>Clear Logs</button>
                 <span className="dot-pulse" style={{ color: 'var(--emerald)' }} />
               </div>
            </div>
            <div className="card-body mono" ref={terminalRef} style={{ background: '#000', padding: 10, fontSize: 10, overflowY: 'auto', flex: 1, minHeight: 0 }}>
               {logs.map((log, i) => {
                 let color = 'var(--muted)';
                 if (log.includes('[ERR]')) color = 'var(--red)';
                 if (log.includes('[OUT]')) color = 'var(--text)';
                 return <div key={i} style={{ color, marginBottom: 4 }}>{log}</div>;
               })}
            </div>
         </div>
      </div>
    </div>
    </div>
  );
}
